<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BSC Faculty Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/adminstyle.css') }}" rel="stylesheet" />
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('facultyhome') }}">
        <span class="fw-800 me-2">BSC</span>
        <span class="opacity-75 small border-start ps-2">Faculty Portal</span>
      </a>
      <div class="d-flex align-items-center">
        <span class="text-white opacity-75 me-3 small d-none d-md-block">Welcome, Faculty Member</span>
        <form method="POST" action="{{ url_for('facultylogout') }}" class="m-0">
          <button type="submit" class="btn btn-sm btn-light fw-bold px-3">Logout</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <nav class="sidebar">
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link {% if request.path == url_for('facultyhome') %}active{% endif %}" href="{{ url_for('facultyhome') }}">
          <i class="bi bi-house-door me-2"></i> Home
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link collapsed" data-bs-toggle="collapse" href="#workloadMenu">
          <span><i class="bi bi-briefcase me-2"></i> Work Load</span>
          <i class="bi bi-chevron-right nav-arrow"></i>
        </a>
        <div class="collapse" id="workloadMenu">
          <ul class="nav flex-column ms-4">
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('facultytimetable') }}">Time Table</a></li>
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('facultysubject') }}">Subjects</a></li>
          </ul>
        </div>
      </li>

      <li class="nav-item">
        <a class="nav-link collapsed" data-bs-toggle="collapse" href="#internalMenu">
          <span><i class="bi bi-journal-check me-2"></i> Internal Marks</span>
          <i class="bi bi-chevron-right nav-arrow"></i>
        </a>
        <div class="collapse" id="internalMenu">
          <ul class="nav flex-column ms-4">
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('facultyinternalmarks') }}">Mark Entry</a></li>
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('facultyinternalwise') }}">Wise Report</a></li>
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('facultyinternalreport') }}">Full Report</a></li>
          </ul>
        </div>
      </li>

      <li class="nav-item">
        <a class="nav-link collapsed" data-bs-toggle="collapse" href="#attendanceMenu">
          <span><i class="bi bi-person-check me-2"></i> Attendance</span>
          <i class="bi bi-chevron-right nav-arrow"></i>
        </a>
        <div class="collapse" id="attendanceMenu">
          <ul class="nav flex-column ms-4">
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('facultystudentattendance') }}">Mark Attendance</a></li>
            <li class="nav-item"><a class="nav-link small" href="{{ url_for('faculty_attendance_report') }}">Attendance Report</a></li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('.collapse').forEach(function (collapseEl) {
      collapseEl.addEventListener('show.bs.collapse', function () {
        const toggleLink = document.querySelector(`[href="#${this.id}"]`);
        if (toggleLink) toggleLink.querySelector('.nav-arrow').classList.add('rotate');
      });
      collapseEl.addEventListener('hide.bs.collapse', function () {
        const toggleLink = document.querySelector(`[href="#${this.id}"]`);
        if (toggleLink) toggleLink.querySelector('.nav-arrow').classList.remove('rotate');
      });
    });
  </script>
</body>
</html>
