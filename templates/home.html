{% extends "base.html" %}
{% block content %}
<div class="container my-5 py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="achievements p-5 shadow-lg">
                <div class="mb-4">
                    <span style="font-size: 4rem;">👋</span>
                </div>
                <h2 class="section-title mb-4">Welcome back, {{ name }}!</h2>
                <p class="lead mb-4">You have successfully authenticated using our secure facial recognition system.</p>
                <div class="mt-5">
                    <a href="{{ url_for('home') }}" class="btn btn-lg text-white px-5 py-3 fw-bold" style="background-color: var(--primary-color);">Go to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
