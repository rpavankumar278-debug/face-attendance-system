<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BSC Student Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/adminstyle.css') }}" rel="stylesheet" />
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('studenthome') }}">
        <span class="fw-800 me-2">BSC</span>
        <span class="opacity-75 small border-start ps-2">Student Portal</span>
      </a>
      <div class="d-flex align-items-center">
        <span class="text-white opacity-75 me-3 small d-none d-md-block">Welcome, Student</span>
        <form method="POST" action="{{ url_for('studentlogout') }}" class="m-0">
          <button type="submit" class="btn btn-sm btn-light fw-bold px-3">Logout</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <nav class="sidebar">
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link {% if request.path == url_for('studenthome') %}active{% endif %}" href="{{ url_for('studenthome') }}">
          <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.path == url_for('studentinternalreport') %}active{% endif %}" href="{{ url_for('studentinternalreport') }}">
          <i class="bi bi-journal-text me-2"></i> Internal Report
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link {% if request.path == url_for('student_attendance') %}active{% endif %}" href="{{ url_for('student_attendance') }}">
          <i class="bi bi-calendar-check me-2"></i> Attendance History
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
